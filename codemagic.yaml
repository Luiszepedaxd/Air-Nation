workflows:
  ios-release:
    name: AirNation iOS Release
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      groups:
        - ios_credentials
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.atomikapps.airnation
      node: 22
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install dependencies
        script: |
          cd frontend
          npm install

      - name: Add iOS platform
        script: |
          cd frontend
          npx cap add ios

      - name: Sync Capacitor iOS
        script: |
          cd frontend
          npx cap sync ios
          echo "--- Contenido de ios/App ---"
          ls -la ios/App/ 2>/dev/null || echo "ios/App no existe"
          echo "--- Podfile ---"
          cat ios/App/Podfile 2>/dev/null || echo "Podfile no existe"

      - name: Copy error.html to iOS bundle
        script: |
          mkdir -p frontend/ios/App/App/public
          cp frontend/public/error.html frontend/ios/App/App/public/error.html
          echo "--- Verificar copia ---"
          ls -la frontend/ios/App/App/public/

      - name: Add public folder to Xcode target
        script: |
          python3 << 'PYEOF'
          import re, uuid

          pbxproj = "frontend/ios/App/App.xcodeproj/project.pbxproj"
          with open(pbxproj, "r") as f:
              content = f.read()

          if "public in Resources" in content:
              print("public folder ya está en el target, saltando")
          else:
              file_ref_id = uuid.uuid4().hex[:24].upper()
              build_file_id = uuid.uuid4().hex[:24].upper()

              file_ref = f'\t\t{file_ref_id} /* public */ = {{isa = PBXFileReference; lastKnownFileType = folder; path = public; sourceTree = "<group>"; }};\n'
              content = content.replace(
                  "/* End PBXFileReference section */",
                  file_ref + "/* End PBXFileReference section */"
              )

              build_file = f'\t\t{build_file_id} /* public in Resources */ = {{isa = PBXBuildFile; fileRef = {file_ref_id} /* public */; }};\n'
              content = content.replace(
                  "/* End PBXBuildFile section */",
                  build_file + "/* End PBXBuildFile section */"
              )

              m = re.search(r'(isa = PBXResourcesBuildPhase;.*?files = \()', content, re.DOTALL)
              if m:
                  content = content[:m.end()] + f'\n\t\t\t\t{build_file_id} /* public in Resources */,' + content[m.end():]
                  print(f"public agregado al target (fileRef={file_ref_id})")
              else:
                  print("ADVERTENCIA: no se encontró PBXResourcesBuildPhase")

              with open(pbxproj, "w") as f:
                  f.write(content)
          PYEOF

      - name: Add Firebase via SPM
        script: |
          PKGSWIFT="frontend/ios/App/CapApp-SPM/Package.swift"
          python3 << 'PYEOF'
          import re

          with open("frontend/ios/App/CapApp-SPM/Package.swift", "r") as f:
              content = f.read()

          # Agregar firebase-ios-sdk a dependencies del Package (no del target)
          content = content.replace(
              '.package(url: "https://github.com/ionic-team/capacitor-swift-pm.git"',
              '.package(url: "https://github.com/firebase/firebase-ios-sdk.git", from: "11.0.0"),\n        .package(url: "https://github.com/ionic-team/capacitor-swift-pm.git"'
          )

          # Agregar FirebaseMessaging a dependencies del target
          content = content.replace(
              '.product(name: "Capacitor", package: "capacitor-swift-pm"),',
              '.product(name: "Capacitor", package: "capacitor-swift-pm"),\n                .product(name: "FirebaseMessaging", package: "firebase-ios-sdk"),'
          )

          with open("frontend/ios/App/CapApp-SPM/Package.swift", "w") as f:
              f.write(content)

          print("Package.swift modificado OK")
          PYEOF

          echo "--- Package.swift resultado ---"
          cat "$PKGSWIFT"

      - name: Add custom URL scheme (airnation://)
        script: |
          /usr/libexec/PlistBuddy -c "Add :CFBundleURLTypes array" frontend/ios/App/App/Info.plist
          /usr/libexec/PlistBuddy -c "Add :CFBundleURLTypes:0 dict" frontend/ios/App/App/Info.plist
          /usr/libexec/PlistBuddy -c "Add :CFBundleURLTypes:0:CFBundleURLSchemes array" frontend/ios/App/App/Info.plist
          /usr/libexec/PlistBuddy -c "Add :CFBundleURLTypes:0:CFBundleURLSchemes:0 string airnation" frontend/ios/App/App/Info.plist
          /usr/libexec/PlistBuddy -c "Add :CFBundleURLTypes:0:CFBundleURLName string com.atomikapps.airnation" frontend/ios/App/App/Info.plist

      - name: Patch AppDelegate for Push Notifications
        script: |
          cat > frontend/ios/App/App/AppDelegate.swift << 'EOF'
          import UIKit
          import Capacitor
          import FirebaseCore
          import FirebaseMessaging

          @UIApplicationMain
          class AppDelegate: UIResponder, UIApplicationDelegate {

              var window: UIWindow?

              func application(_ application: UIApplication, didFinishLaunchingWithOptions launchOptions: [UIApplication.LaunchOptionsKey: Any]?) -> Bool {

                  let options = FirebaseOptions(
                      googleAppID: "1:189913608017:ios:6c6354bbee5c5dee68ad70",
                      gcmSenderID: "189913608017"
                  )
                  options.apiKey = "AIzaSyCq1l067hwnHdIPN0nADhh_2RXY5-ddwKg"
                  options.projectID = "airnation-4b53a"
                  options.bundleID = "com.atomikapps.airnation"
                  FirebaseApp.configure(options: options)

                  return true
              }

              func applicationWillResignActive(_ application: UIApplication) {}
              func applicationDidEnterBackground(_ application: UIApplication) {}
              func applicationWillEnterForeground(_ application: UIApplication) {}
              func applicationDidBecomeActive(_ application: UIApplication) {}
              func applicationWillTerminate(_ application: UIApplication) {}

              func application(_ app: UIApplication, open url: URL, options: [UIApplication.OpenURLOptionsKey: Any] = [:]) -> Bool {
                  return ApplicationDelegateProxy.shared.application(app, open: url, options: options)
              }

              func application(_ application: UIApplication, continue userActivity: NSUserActivity, restorationHandler: @escaping ([UIUserActivityRestoring]?) -> Void) -> Bool {
                  return ApplicationDelegateProxy.shared.application(application, continue: userActivity, restorationHandler: restorationHandler)
              }

              func application(_ application: UIApplication, didRegisterForRemoteNotificationsWithDeviceToken deviceToken: Data) {
                  Messaging.messaging().apnsToken = deviceToken
                  Messaging.messaging().token(completion: { (token, error) in
                      if let error = error {
                          NotificationCenter.default.post(name: .capacitorDidFailToRegisterForRemoteNotifications, object: error)
                      } else if let token = token {
                          NotificationCenter.default.post(name: .capacitorDidRegisterForRemoteNotifications, object: token)
                      }
                  })
              }

              func application(_ application: UIApplication, didFailToRegisterForRemoteNotificationsWithError error: Error) {
                  NotificationCenter.default.post(name: .capacitorDidFailToRegisterForRemoteNotifications, object: error)
              }
          }
          EOF

      - name: Add iOS entitlements
        script: |
          cat > frontend/ios/App/App/App.entitlements << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>com.apple.developer.applesignin</key>
              <array>
                  <string>Default</string>
              </array>
              <key>aps-environment</key>
              <string>production</string>
              <key>com.apple.developer.associated-domains</key>
              <array>
                  <string>applinks:www.airnation.online</string>
              </array>
          </dict>
          </plist>
          EOF

      - name: Set app icon
        script: |
          cd frontend
          npm install @capacitor/assets --save-dev
          mkdir -p assets
          cp ../brand-assets/icon-1024.png assets/icon-only.png
          cp ../brand-assets/splash-white-2732x2732.png assets/splash.png
          cp ../brand-assets/splash-white-2732x2732.png assets/splash-dark.png
          npx capacitor-assets generate --iconBackgroundColor '#FFFFFF' --iconBackgroundColorDark '#111111' --splashBackgroundColor '#FFFFFF' --splashBackgroundColorDark '#111111' --ios

      - name: Set iOS privacy descriptions
        script: |
          /usr/libexec/PlistBuddy -c "Add :NSPhotoLibraryUsageDescription string 'AirNation necesita acceso a tu galería para subir fotos de perfil, réplicas y publicaciones.'" frontend/ios/App/App/Info.plist
          /usr/libexec/PlistBuddy -c "Add :NSCameraUsageDescription string 'AirNation necesita acceso a tu cámara para tomar tu foto de credencial.'" frontend/ios/App/App/Info.plist
          /usr/libexec/PlistBuddy -c "Add :ITSAppUsesNonExemptEncryption bool false" frontend/ios/App/App/Info.plist

      - name: Set version
        script: |
          cd frontend/ios/App
          agvtool new-marketing-version 1.0.2
          agvtool new-version -all 2

      - name: Verificar estructura iOS
        script: |
          ls -la frontend/ios/App/App/
          cat frontend/ios/App/App/AppDelegate.swift
          cat frontend/ios/App/capacitor.config.json 2>/dev/null || echo "no capacitor.config.json"

      - name: Build iOS
        script: |
          xcode-project use-profiles
          xcodebuild \
            -project frontend/ios/App/App.xcodeproj \
            -scheme App \
            -configuration Release \
            -archivePath $CM_BUILD_DIR/App.xcarchive \
            archive \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM=VXCWCHX93N \
            CODE_SIGN_ENTITLEMENTS=App/App.entitlements

      - name: Export IPA
        script: |
          xcodebuild -exportArchive \
            -archivePath $CM_BUILD_DIR/App.xcarchive \
            -exportOptionsPlist /Users/builder/export_options.plist \
            -exportPath $CM_BUILD_DIR/build/ios/ipa

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: false

  android-release:
    name: AirNation Android Release
    max_build_duration: 60
    instance_type: linux_x2
    environment:
      node: 22
      java: 17
    scripts:
      - name: Install dependencies
        script: |
          cd frontend
          npm install

      - name: Sync Capacitor Android
        script: |
          cd frontend
          npm run build
          npx cap sync android

      - name: Inject google-services.json
        script: |
          echo $GOOGLE_SERVICES_JSON | base64 --decode > frontend/android/app/google-services.json

      - name: Build Android
        script: |
          cd frontend/android
          ./gradlew assembleRelease

    artifacts:
      - frontend/android/app/build/outputs/**/*.apk
