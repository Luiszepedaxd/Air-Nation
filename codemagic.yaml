workflows:
  ios-release:
    name: AirNation iOS Release
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      groups:
        - ios_credentials
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.atomikapps.airnation
      node: 22
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install dependencies
        script: |
          cd frontend
          npm install

      - name: Add iOS platform
        script: |
          cd frontend
          npx cap add ios

      - name: Sync Capacitor iOS
        script: |
          cd frontend
          npx cap sync ios

      - name: Patch AppDelegate for Push Notifications
        script: |
          cat > frontend/ios/App/App/AppDelegate.swift << 'EOF'
          import UIKit
          import Capacitor

          @UIApplicationMain
          class AppDelegate: UIResponder, UIApplicationDelegate {

              var window: UIWindow?

              func application(_ application: UIApplication, didFinishLaunchingWithOptions launchOptions: [UIApplication.LaunchOptionsKey: Any]?) -> Bool {
                  return true
              }

              func applicationWillResignActive(_ application: UIApplication) {}
              func applicationDidEnterBackground(_ application: UIApplication) {}
              func applicationWillEnterForeground(_ application: UIApplication) {}
              func applicationDidBecomeActive(_ application: UIApplication) {}
              func applicationWillTerminate(_ application: UIApplication) {}

              func application(_ app: UIApplication, open url: URL, options: [UIApplication.OpenURLOptionsKey: Any] = [:]) -> Bool {
                  return ApplicationDelegateProxy.shared.application(app, open: url, options: options)
              }

              func application(_ application: UIApplication, continue userActivity: NSUserActivity, restorationHandler: @escaping ([UIUserActivityRestoring]?) -> Void) -> Bool {
                  return ApplicationDelegateProxy.shared.application(application, continue: userActivity, restorationHandler: restorationHandler)
              }

              func application(_ application: UIApplication, didRegisterForRemoteNotificationsWithDeviceToken deviceToken: Data) {
                  NotificationCenter.default.post(name: .capacitorDidRegisterForRemoteNotifications, object: deviceToken)
              }

              func application(_ application: UIApplication, didFailToRegisterForRemoteNotificationsWithError error: Error) {
                  NotificationCenter.default.post(name: .capacitorDidFailToRegisterForRemoteNotifications, object: error)
              }
          }
          EOF

      - name: Add custom URL scheme (airnation://)
        script: |
          /usr/libexec/PlistBuddy -c "Add :CFBundleURLTypes array" frontend/ios/App/App/Info.plist
          /usr/libexec/PlistBuddy -c "Add :CFBundleURLTypes:0 dict" frontend/ios/App/App/Info.plist
          /usr/libexec/PlistBuddy -c "Add :CFBundleURLTypes:0:CFBundleURLSchemes array" frontend/ios/App/App/Info.plist
          /usr/libexec/PlistBuddy -c "Add :CFBundleURLTypes:0:CFBundleURLSchemes:0 string airnation" frontend/ios/App/App/Info.plist
          /usr/libexec/PlistBuddy -c "Add :CFBundleURLTypes:0:CFBundleURLName string com.atomikapps.airnation" frontend/ios/App/App/Info.plist

      - name: Add iOS entitlements
        script: |
          cat > frontend/ios/App/App/App.entitlements << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>com.apple.developer.applesignin</key>
              <array>
                  <string>Default</string>
              </array>
              <key>aps-environment</key>
              <string>production</string>
          </dict>
          </plist>
          EOF

      - name: Inject GoogleService-Info.plist
        script: |
          echo $GOOGLE_SERVICE_INFO_PLIST | base64 --decode > frontend/ios/App/App/GoogleService-Info.plist

      - name: Set app icon
        script: |
          cd frontend
          npm install @capacitor/assets --save-dev
          mkdir -p assets
          cp ../brand-assets/icon-1024.png assets/icon-only.png
          cp ../brand-assets/splash-white-2732x2732.png assets/splash.png
          cp ../brand-assets/splash-white-2732x2732.png assets/splash-dark.png
          npx capacitor-assets generate --iconBackgroundColor '#FFFFFF' --iconBackgroundColorDark '#111111' --splashBackgroundColor '#FFFFFF' --splashBackgroundColorDark '#111111' --ios

      - name: Set iOS privacy descriptions
        script: |
          /usr/libexec/PlistBuddy -c "Add :NSPhotoLibraryUsageDescription string 'AirNation necesita acceso a tu galería para subir fotos de perfil, réplicas y publicaciones.'" frontend/ios/App/App/Info.plist
          /usr/libexec/PlistBuddy -c "Add :NSCameraUsageDescription string 'AirNation necesita acceso a tu cámara para tomar tu foto de credencial.'" frontend/ios/App/App/Info.plist
          /usr/libexec/PlistBuddy -c "Add :ITSAppUsesNonExemptEncryption bool false" frontend/ios/App/App/Info.plist

      - name: Set version
        script: |
          cd frontend/ios/App
          agvtool new-marketing-version 1.0.1
          agvtool new-version -all 5

      - name: Verificar estructura iOS
        script: |
          ls -la frontend/ios/App/App/
          cat frontend/ios/App/App/AppDelegate.swift
          cat frontend/ios/App/capacitor.config.json 2>/dev/null || echo "no capacitor.config.json"

      - name: Build iOS
        script: |
          xcode-project use-profiles
          xcodebuild \
            -project frontend/ios/App/App.xcodeproj \
            -scheme App \
            -configuration Release \
            -archivePath $CM_BUILD_DIR/App.xcarchive \
            archive \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM=VXCWCHX93N \
            CODE_SIGN_ENTITLEMENTS=App/App.entitlements

      - name: Export IPA
        script: |
          xcodebuild -exportArchive \
            -archivePath $CM_BUILD_DIR/App.xcarchive \
            -exportOptionsPlist /Users/builder/export_options.plist \
            -exportPath $CM_BUILD_DIR/build/ios/ipa

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: false

  android-release:
    name: AirNation Android Release
    max_build_duration: 60
    instance_type: linux_x2
    environment:
      node: 22
      java: 17
    scripts:
      - name: Install dependencies
        script: |
          cd frontend
          npm install

      - name: Sync Capacitor Android
        script: |
          cd frontend
          npm run build
          npx cap sync android

      - name: Inject google-services.json
        script: |
          echo $GOOGLE_SERVICES_JSON | base64 --decode > frontend/android/app/google-services.json

      - name: Build Android
        script: |
          cd frontend/android
          ./gradlew assembleRelease

    artifacts:
      - frontend/android/app/build/outputs/**/*.apk
