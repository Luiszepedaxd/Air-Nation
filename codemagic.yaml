workflows:
  ios-release:
    name: AirNation iOS Release
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      groups:
        - ios_credentials
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.atomikapps.airnation
      node: 22
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install dependencies
        script: |
          cd frontend
          npm install

      - name: Add iOS platform
        script: |
          cd frontend
          npx cap add ios

      - name: Sync Capacitor iOS
        script: |
          cd frontend
          npx cap sync ios

      - name: Set version
        script: |
          cd frontend/ios/App
          agvtool new-marketing-version 1.0.0
          agvtool new-version -all 1

      - name: Build iOS
        script: |
          xcode-project use-profiles
          xcodebuild \
            -workspace frontend/ios/App/App.xcworkspace \
            -scheme App \
            -configuration Release \
            -archivePath $CM_BUILD_DIR/App.xcarchive \
            archive \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM=VXCWCHX93N

      - name: Export IPA
        script: |
          xcode-project build-ipa \
            --workspace frontend/ios/App/App.xcworkspace \
            --scheme App \
            --archive-path $CM_BUILD_DIR/App.xcarchive

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: false
