workflows:
  ios-release:
    name: AirNation iOS Release
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      groups:
        - ios_credentials
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.atomikapps.airnation
      node: 22
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install dependencies
        script: |
          cd frontend
          npm install

      - name: Add iOS platform
        script: |
          cd frontend
          npx cap add ios

      - name: Sync Capacitor iOS
        script: |
          cd frontend
          npx cap sync ios

      - name: Set app icon
        script: |
          cd frontend
          npm install @capacitor/assets --save-dev
          mkdir -p assets
          cp ../brand-assets/icon-1024.png assets/icon-only.png
          cp ../brand-assets/splash-white-2732x2732.png assets/splash.png
          cp ../brand-assets/splash-white-2732x2732.png assets/splash-dark.png
          npx capacitor-assets generate --iconBackgroundColor '#FFFFFF' --iconBackgroundColorDark '#111111' --splashBackgroundColor '#FFFFFF' --splashBackgroundColorDark '#111111' --ios

      - name: Set iOS privacy descriptions
        script: |
          /usr/libexec/PlistBuddy -c "Add :NSPhotoLibraryUsageDescription string 'AirNation necesita acceso a tu galería para subir fotos de perfil, réplicas y publicaciones.'" frontend/ios/App/App/Info.plist
          /usr/libexec/PlistBuddy -c "Add :NSCameraUsageDescription string 'AirNation necesita acceso a tu cámara para tomar tu foto de credencial.'" frontend/ios/App/App/Info.plist
          /usr/libexec/PlistBuddy -c "Add :ITSAppUsesNonExemptEncryption bool false" frontend/ios/App/App/Info.plist

      - name: Set version
        script: |
          cd frontend/ios/App
          agvtool new-marketing-version 1.0.0
          agvtool new-version -all 2

      - name: Verificar estructura iOS
        script: |
          ls -la frontend/ios/App/

      - name: Build iOS
        script: |
          xcode-project use-profiles
          xcodebuild \
            -project frontend/ios/App/App.xcodeproj \
            -scheme App \
            -configuration Release \
            -archivePath $CM_BUILD_DIR/App.xcarchive \
            archive \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM=VXCWCHX93N

      - name: Export IPA
        script: |
          xcodebuild -exportArchive \
            -archivePath $CM_BUILD_DIR/App.xcarchive \
            -exportOptionsPlist /Users/builder/export_options.plist \
            -exportPath $CM_BUILD_DIR/build/ios/ipa

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: false
