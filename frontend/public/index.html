<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>AirNation</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #FFFFFF;
      color: #111111;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 32px 24px;
      padding-top: max(32px, env(safe-area-inset-top));
      padding-bottom: max(32px, env(safe-area-inset-bottom));
    }
    #error { display: none; width: 100%; max-width: 360px; text-align: center; }
    h1 {
      font-size: 20px; font-weight: 800; text-transform: uppercase;
      margin-bottom: 12px; letter-spacing: -0.01em;
    }
    p { font-size: 15px; line-height: 1.5; color: #666666; margin-bottom: 28px; }
    button {
      width: 100%; background: #CC4B37; color: #FFFFFF; border: none;
      padding: 16px; font-size: 13px; font-weight: 800;
      text-transform: uppercase; letter-spacing: 0.05em;
      cursor: pointer; -webkit-appearance: none;
    }
    .diag {
      margin-top: 20px; font-family: ui-monospace, Menlo, monospace;
      font-size: 11px; color: #AAAAAA; word-break: break-all;
      white-space: pre-wrap; text-align: left;
    }
  </style>
</head>
<body>
  <div id="error">
    <h1>Sin conexión</h1>
    <p>No pudimos cargar AirNation. Revisa tu conexión a internet e inténtalo de nuevo.</p>
    <button onclick="go()">Reintentar</button>
    <div class="diag" id="diag"></div>
  </div>

  <script>
    var TARGET = 'https://www.airnation.online';
    var TIMEOUT_MS = 12000;
    var attempt = 0;
    var timer = null;

    function hideSplash() {
      try {
        if (window.Capacitor && window.Capacitor.Plugins && window.Capacitor.Plugins.SplashScreen) {
          window.Capacitor.Plugins.SplashScreen.hide();
        }
      } catch (e) { /* ignore */ }
    }

    function showError(reason) {
      hideSplash();
      document.getElementById('error').style.display = 'block';
      document.getElementById('diag').textContent =
        'online: ' + navigator.onLine +
        '\nintentos: ' + attempt +
        '\nmotivo: ' + reason;
    }

    function go() {
      attempt++;
      document.getElementById('error').style.display = 'none';
      if (timer) clearTimeout(timer);

      // Si en TIMEOUT_MS no navegamos, mostramos error en vez de colgarnos.
      timer = setTimeout(function () {
        if (attempt < 2) {
          go();
        } else {
          showError('timeout de carga');
        }
      }, TIMEOUT_MS);

      // Verificar alcance del servidor antes de navegar. Si responde,
      // la navegación es segura; si no, atrapamos el fallo aquí.
      try {
        var xhr = new XMLHttpRequest();
        xhr.open('HEAD', TARGET + '/?boot=' + Date.now(), true);
        xhr.timeout = TIMEOUT_MS - 2000;
        xhr.onload = function () {
          clearTimeout(timer);
          window.location.replace(TARGET);
        };
        xhr.onerror = function () {
          clearTimeout(timer);
          if (attempt < 2) { setTimeout(go, 800); }
          else { showError('no se pudo alcanzar el servidor'); }
        };
        xhr.ontimeout = function () {
          clearTimeout(timer);
          if (attempt < 2) { setTimeout(go, 800); }
          else { showError('timeout de red'); }
        };
        xhr.send();
      } catch (e) {
        clearTimeout(timer);
        showError('excepción: ' + e);
      }
    }

    // Arrancar apenas el documento esté listo.
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', go);
    } else {
      go();
    }
  </script>
</body>
</html>
