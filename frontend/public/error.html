<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>AirNation</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #111111;
      color: #FFFFFF;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 32px 24px;
      padding-top: max(32px, env(safe-area-inset-top));
      padding-bottom: max(32px, env(safe-area-inset-bottom));
    }
    h1 { font-size: 22px; font-weight: 800; text-transform: uppercase; margin-bottom: 12px; }
    p { font-size: 15px; line-height: 1.5; color: rgba(255,255,255,0.8); margin-bottom: 24px; }
    .box {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      padding: 16px;
      margin-bottom: 24px;
      font-family: ui-monospace, Menlo, monospace;
      font-size: 12px;
      line-height: 1.6;
      word-break: break-all;
      white-space: pre-wrap;
      color: #FFD9D3;
    }
    button {
      width: 100%;
      background: #CC4B37;
      color: #FFFFFF;
      border: none;
      padding: 16px;
      font-size: 13px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      cursor: pointer;
    }
    .label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: rgba(255,255,255,0.5); margin-bottom: 8px; }
  </style>
</head>
<body>
  <h1>No se pudo conectar</h1>
  <p>La app no pudo cargar el contenido. Comparte esta información con soporte:</p>

  <div class="label">Detalle del error</div>
  <div class="box" id="errorBox">Recopilando…</div>

  <button onclick="location.replace('https://www.airnation.online')">Reintentar</button>

  <script>
    (function () {
      var parts = [];
      parts.push('URL: ' + window.location.href);

      try {
        var params = new URLSearchParams(window.location.search);
        params.forEach(function (value, key) {
          parts.push(key + ': ' + value);
        });
        if (Array.from(params.keys()).length === 0) {
          parts.push('(sin query params)');
        }
      } catch (e) {
        parts.push('parse error: ' + e);
      }

      parts.push('Hash: ' + (window.location.hash || '(vacío)'));
      parts.push('Online: ' + navigator.onLine);
      parts.push('UA: ' + navigator.userAgent);
      parts.push('Hora: ' + new Date().toISOString());

      document.getElementById('errorBox').textContent = parts.join('\n');
    })();
  </script>
</body>
</html>
